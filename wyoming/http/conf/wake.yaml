---
openapi: "3.0.0"
info:
  title: 'Wyoming Wake'
  version: '1.0.0'
  description: 'API for Wake Word Detection'
paths:
  /api/info:
    get:
      summary: 'Get service information'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
  /api/detect-wake-word:
    post:
      summary: 'Detect if wake word(s) are in WAV audio'
      requestBody:
        description: 'WAV data (16-bit 16Khz mono preferred)'
        required: true
        content:
          audio/wav:
            schema:
              type: string
              format: binary
      parameters:
        - in: query
          name: uri
          description: 'URI of Wyoming wake service'
          schema:
            type: string
        - in: query
          name: wake_words
          description: 'List of wake word names to check for'
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ["okay_nabu"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
